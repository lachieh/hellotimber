packages:
  - website
  - packages/*

catalogMode: prefer

# Approve native build scripts (pnpm 11 allowBuilds map). esbuild + lightningcss
# ship prebuilt binaries via their install scripts; both are trusted deps.
allowBuilds:
  esbuild: true
  lightningcss: true

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  react: ^19.2.0
  react-dom: ^19.2.0
  "@types/react": ^19.2.0
  "@types/react-dom": ^19.2.0
  three: ^0.184.0
  "@types/three": ^0.184.0
  "@react-three/fiber": ^9.6.1
  "@react-three/drei": ^10.7.7
  "@tanstack/devtools-vite": latest
  "@tanstack/router-cli": latest
  "@tanstack/react-devtools": latest
  "@tanstack/react-router": latest
  "@tanstack/react-router-devtools": latest
  "@tanstack/react-router-ssr-query": latest
  "@tanstack/react-start": latest
  "@tanstack/router-plugin": latest
  nitro: 3.0.260610-beta
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
minimumReleaseAgeExclude:
  - "@vercel/python@6.45.0"
  - vercel@54.14.0
